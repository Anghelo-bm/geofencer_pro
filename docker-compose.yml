version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: geofencing_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geofencing_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geofencing_api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=geofencing_db;Username=postgres;Password=postgres
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt__Key=SUPER_SECRET_KEY_FOR_JWT_GEOFENCING_SYSTEM
      - Jwt__Issuer=GeofenceSystem
      - Jwt__Audience=GeofenceSystem

  web_admin:
    build:
      context: ./web_admin
      dockerfile: Dockerfile
    container_name: geofencing_web
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
